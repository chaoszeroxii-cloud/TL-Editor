<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Translation Editor</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <!-- Note: Server-side CSP in main/index.ts overrides this, but we keep it for safety -->
    <!-- Note: frame-ancestors is ignored in meta tags; server header takes precedence -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src blob: 'self'; connect-src 'self' https:; object-src 'none'; base-uri 'self'"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
